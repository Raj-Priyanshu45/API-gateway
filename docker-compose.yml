services:
  http-bin:
    container_name: kennethreitz
    image: kennethreitz/httpbin
    ports:
      - "9000:80"

  redis:
    container_name: redis-db
    image: redis:7-alpine
    ports:
      - "6379:6379"

  keycloak-mysql:
    container_name: keycloak-mysql
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak-mysql
      MYSQL_PASSWORD: root

    volumes:
      - ./volume-dat/mysql_keycloak_data:/var/lib/mysql

    ports:
      - "4306:3306"

  keycloak:
    container_name: keyCloak
    image: quay.io/keycloak/keycloak:26.5.4
    command: [ "start-dev" ]
    environment:
      KC_DB: mysql
      KC_DB_URL_HOST: keycloak-mysql
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak-mysql
      KC_DB_PASSWORD: root
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

    ports:
      - "8181:8080"
    depends_on:
      - keycloak-mysql
